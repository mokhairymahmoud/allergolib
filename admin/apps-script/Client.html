<script>
(function () {
  var state = {
    allData: { aliases: [], testEntries: [], notes: [], crossReactivity: [] },
    collapsed: {},
    defaultSourceId: "",
    deleteConfirmation: "",
    deleteConfirmingId: null,
    form: null,
    lookups: [],
    mode: "create",
    noteKinds: ["info", "warning", "cross-reactivity"],
    originalId: "",
    searchQuery: "",
    sources: [],
    testKinds: ["prick", "idr", "patch"],
    crossReactivityTiers: ["higher-concern", "lower-expected", "uncertain"],
    structuralRelations: ["structurally-related", "structurally-distinct"],
    validation: emptyValidation(),
    view: "list",
  };

  var elements = {};

  document.addEventListener("DOMContentLoaded", init);

  function init() {
    elements.listView = document.getElementById("listView");
    elements.editView = document.getElementById("editView");
    elements.searchBox = document.getElementById("searchBox");
    elements.cardGrid = document.getElementById("cardGrid");
    elements.listMeta = document.getElementById("listMeta");
    elements.listSubtitle = document.getElementById("listSubtitle");
    elements.createDrugButton = document.getElementById("createDrugButton");
    elements.publishAllButton = document.getElementById("publishAllButton");
    elements.backToListButton = document.getElementById("backToListButton");
    elements.cancelButton = document.getElementById("cancelButton");
    elements.statusBanner = document.getElementById("statusBanner");
    elements.editStatusBanner = document.getElementById("editStatusBanner");
    elements.modeTitle = document.getElementById("modeTitle");
    elements.formSections = document.getElementById("formSections");
    elements.drugForm = document.getElementById("drugForm");
    elements.saveButton = document.getElementById("saveButton");
    elements.actionNote = document.getElementById("actionNote");

    elements.searchBox.addEventListener("input", handleSearchInput);
    elements.createDrugButton.addEventListener("click", handleCreateDrug);
    elements.publishAllButton.addEventListener("click", handlePublish);
    elements.backToListButton.addEventListener("click", handleBackToList);
    elements.cancelButton.addEventListener("click", handleBackToList);
    elements.cardGrid.addEventListener("click", handleCardClick);
    elements.formSections.addEventListener("click", handleFormClick);
    elements.formSections.addEventListener("change", handleFormChange);
    elements.drugForm.addEventListener("submit", handleSave);

    setStatus("Loading spreadsheet data…", "info");

    google.script.run
      .withSuccessHandler(handleBootstrapSuccess)
      .withFailureHandler(handleServerError)
      .bootstrapAdminApp();
  }

  // ── Bootstrap & Server ───────────────────────────────

  function handleBootstrapSuccess(payload) {
    state.defaultSourceId = payload.defaultSourceId || "";
    state.lookups = payload.lookups || [];
    state.mode = "create";
    state.noteKinds = payload.noteKinds || state.noteKinds;
    state.originalId = "";
    state.searchQuery = "";
    state.sources = payload.sources || [];
    state.testKinds = payload.testKinds || state.testKinds;
    state.crossReactivityTiers = payload.crossReactivityTiers || state.crossReactivityTiers;
    state.structuralRelations = payload.structuralRelations || state.structuralRelations;
    state.allData = payload.allData || state.allData;
    state.form = emptyDrug(state.defaultSourceId);
    state.validation = emptyValidation();
    state.deleteConfirmation = "";
    state.deleteConfirmingId = null;

    applyUiText(payload.uiText);
    setStatus(payload.connectedStatus, "success");
    showListView();
  }

  function handleServerError(error) {
    var message =
      error && error.message ? error.message : "The admin app could not complete the request.";
    setStatus(message, "error");
  }

  // ── View Switching ───────────────────────────────────

  function showListView() {
    state.view = "list";
    state.deleteConfirmingId = null;
    elements.listView.classList.remove("isHidden");
    elements.editView.classList.add("isHidden");
    renderCardGrid();
  }

  function showEditView() {
    state.view = "edit";
    elements.listView.classList.add("isHidden");
    elements.editView.classList.remove("isHidden");
    renderForm();
    window.scrollTo(0, 0);
  }

  // ── List View Handlers ───────────────────────────────

  function handleSearchInput(event) {
    state.searchQuery = event.target.value;
    renderCardGrid();
  }

  function handleCreateDrug() {
    state.mode = "create";
    state.originalId = "";
    state.form = emptyDrug(state.defaultSourceId);
    state.validation = emptyValidation();
    state.deleteConfirmation = "";
    setEditStatus("Create mode ready.", "info");
    showEditView();
  }

  function handleBackToList() {
    setEditStatus("", "");
    showListView();
  }

  function handleCardClick(event) {
    var target = event.target.closest("[data-action]");
    if (!target) return;

    var action = target.getAttribute("data-action");
    var drugId = target.getAttribute("data-drug-id");

    if (action === "edit-drug") {
      loadAndEditDrug(drugId);
      return;
    }

    if (action === "start-delete") {
      state.deleteConfirmingId = drugId;
      renderCardGrid();
      return;
    }

    if (action === "cancel-delete") {
      state.deleteConfirmingId = null;
      renderCardGrid();
      return;
    }

    if (action === "confirm-delete-card") {
      var confirmInput = document.getElementById("delete-confirm-" + drugId);
      var confirmation = confirmInput ? confirmInput.value.trim() : "";
      executeCardDelete(drugId, confirmation);
    }
  }

  function loadAndEditDrug(drugId) {
    var drug = assembleDrugFromCache(drugId);
    if (!drug) {
      setStatus("Drug " + drugId + " not found.", "error");
      return;
    }
    state.mode = "edit";
    state.originalId = drugId;
    state.form = normalizeLoadedDrug(drug);
    state.validation = emptyValidation();
    state.deleteConfirmation = "";
    setStatus("", "");
    setEditStatus("Loaded " + drugId + ".", "success");
    showEditView();
  }

  function assembleDrugFromCache(drugId) {
    var lookup = state.lookups.find(function (l) { return l.id === drugId; });
    if (!lookup) return null;

    var defaultSrcId = state.defaultSourceId;
    var record = {
      id: lookup.id,
      name: { en: lookup.name.en || "", fr: lookup.name.fr || "" },
      className: { en: lookup.className.en || "", fr: lookup.className.fr || "" },
      subclassName: { en: (lookup.subclassName && lookup.subclassName.en) || "", fr: (lookup.subclassName && lookup.subclassName.fr) || "" },
      aliases: [],
      applicableTests: [],
      tests: {},
      crossReactivity: [],
    };

    record.aliases = state.allData.aliases
      .filter(function (r) { return r.drug_id === drugId; })
      .map(function (r) { return (r.alias || "").trim(); })
      .filter(Boolean);
    if (!record.aliases.length) record.aliases = [""];

    var testKinds = state.testKinds;
    var applicableKinds = {};

    var testEntriesByKind = {};
    state.allData.testEntries
      .filter(function (r) { return r.drug_id === drugId && testKinds.indexOf(r.test_kind) >= 0; })
      .forEach(function (r) {
        if (!testEntriesByKind[r.test_kind]) testEntriesByKind[r.test_kind] = [];
        testEntriesByKind[r.test_kind].push(r);
      });

    testKinds.forEach(function (testKind) {
      var rows = testEntriesByKind[testKind] || [];
      if (!rows.length) {
        record.tests[testKind] = {
          dilutions: "", vehicle: { en: "", fr: "" },
          sourceEntries: [{ sourceId: defaultSrcId, concentration: "", maxConcentration: "", isPreferred: true }],
          notes: [],
        };
        return;
      }

      var preferredRow = rows.find(function (r) { return String(r.is_preferred).toLowerCase() === "true"; }) || rows[0];
      record.tests[testKind] = {
        dilutions: (preferredRow.dilutions || "").trim(),
        vehicle: {
          en: (preferredRow.vehicle_en || "").trim(),
          fr: (preferredRow.vehicle_fr || "").trim(),
        },
        sourceEntries: rows.map(function (r) {
          return {
            sourceId: (r.source_id || "").trim() || defaultSrcId,
            concentration: (r.concentration || "").trim(),
            maxConcentration: (r.max_concentration || "").trim(),
            isPreferred: String(r.is_preferred).toLowerCase() === "true",
          };
        }),
        notes: [],
      };

      var hasContent = record.tests[testKind].sourceEntries.some(function (e) {
        return e.concentration || e.maxConcentration;
      }) || record.tests[testKind].dilutions || record.tests[testKind].vehicle.en || record.tests[testKind].vehicle.fr;
      if (hasContent) applicableKinds[testKind] = true;
    });

    state.allData.notes
      .filter(function (r) { return r.drug_id === drugId; })
      .forEach(function (r) {
        if (testKinds.indexOf(r.test_kind) < 0) return;
        if (!record.tests[r.test_kind]) return;
        record.tests[r.test_kind].notes.push({
          kind: (r.note_kind || "").trim() || "info",
          value: { en: (r.note_en || "").trim(), fr: (r.note_fr || "").trim() },
        });
        applicableKinds[r.test_kind] = true;
      });

    record.applicableTests = testKinds.filter(function (tk) { return applicableKinds[tk]; });

    var crRows = state.allData.crossReactivity.filter(function (r) { return r.drug_id === drugId; });
    record.crossReactivity = buildCrGroupsFromRows(crRows);

    return record;
  }

  function buildCrGroupsFromRows(rows) {
    var groupMap = {};
    var groupOrder = [];

    rows.forEach(function (row) {
      var key = (row.group_name_en || "").trim() + "||" + (row.group_name_fr || "").trim();
      if (!groupMap[key]) {
        groupMap[key] = {
          groupName: { en: (row.group_name_en || "").trim(), fr: (row.group_name_fr || "").trim() },
          entries: [],
          suggestedPanel: [],
          panelRationale: { en: "", fr: "" },
        };
        groupOrder.push(key);
      }

      var panelIds = (row.panel_drug_ids || "").trim();
      if (panelIds) {
        groupMap[key].suggestedPanel = panelIds.split(";").map(function (s) { return s.trim(); }).filter(Boolean);
      }
      var pRatEn = (row.panel_rationale_en || "").trim();
      var pRatFr = (row.panel_rationale_fr || "").trim();
      if (pRatEn) groupMap[key].panelRationale.en = pRatEn;
      if (pRatFr) groupMap[key].panelRationale.fr = pRatFr;

      var srcIds = (row.source_ids || "").trim();
      groupMap[key].entries.push({
        relatedDrugId: (row.related_drug_id || "").trim(),
        tier: (row.tier || "").trim(),
        structuralRelation: (row.structural_relation || "").trim(),
        rationale: { en: (row.rationale_en || "").trim(), fr: (row.rationale_fr || "").trim() },
        sourceIds: srcIds ? srcIds.split(";").map(function (s) { return s.trim(); }).filter(Boolean) : [],
      });
    });

    return groupOrder.map(function (key) { return groupMap[key]; });
  }

  function executeCardDelete(drugId, confirmation) {
    if (confirmation !== drugId) {
      setStatus("Delete confirmation does not match the drug id.", "error");
      return;
    }

    setStatus("Deleting " + drugId + "…", "info");

    google.script.run
      .withSuccessHandler(function (payload) {
        state.lookups = payload.lookups || state.lookups;
        state.sources = payload.sources || state.sources;
        state.allData = payload.allData || state.allData;
        state.deleteConfirmingId = null;
        setStatus(payload.message, "success");
        renderCardGrid();
      })
      .withFailureHandler(handleServerError)
      .deleteDrugFromAdmin({
        drugId: drugId,
        confirmation: confirmation,
      });
  }

  function handlePublish() {
    elements.publishAllButton.disabled = true;
    setStatus("Triggering GitHub workflow…", "info");

    google.script.run
      .withSuccessHandler(function (payload) {
        elements.publishAllButton.disabled = false;
        setStatus(payload.message, "success");
      })
      .withFailureHandler(function (error) {
        elements.publishAllButton.disabled = false;
        handleServerError(error);
      })
      .publishDatasetFromAdmin();
  }

  // ── Card Grid Rendering ──────────────────────────────

  function renderCardGrid() {
    var normalizedQuery = normalize(state.searchQuery);
    var items = filteredLookups(normalizedQuery);

    elements.listMeta.textContent =
      items.length + " drug" + (items.length === 1 ? "" : "s") +
      " in the dataset";

    if (!items.length) {
      elements.cardGrid.innerHTML =
        '<div class="emptyState">No drugs match your search.</div>';
      return;
    }

    elements.cardGrid.innerHTML = items
      .map(function (item) {
        var isDeleting = state.deleteConfirmingId === item.id;
        return renderDrugCard(item, isDeleting);
      })
      .join("");
  }

  function renderDrugCard(item, isDeleting) {
    var cardClass = "drugCard" + (isDeleting ? " isDeleting" : "");
    var primaryName = item.name.fr || item.name.en || item.id;
    var secondaryName = item.name.en || "";
    var className = item.className.fr || item.className.en || "";
    var subclassName = (item.subclassName && (item.subclassName.fr || item.subclassName.en)) || "";

    var html =
      '<div class="' + cardClass + '">' +
        '<div class="drugCardHeader">' +
          '<div>' +
            '<h3 class="drugCardName">' + escapeHtml(primaryName) + '</h3>' +
            '<div class="drugCardMeta">' +
              (secondaryName ? escapeHtml(secondaryName) : "") +
              (className ? (secondaryName ? " &middot; " : "") + escapeHtml(className) : "") +
              (subclassName ? " &middot; " + escapeHtml(subclassName) : "") +
            '</div>' +
          '</div>' +
          '<span class="pill">' + escapeHtml(item.id) + '</span>' +
        '</div>';

    if (isDeleting) {
      html +=
        '<div class="drugCardDeleteConfirm">' +
          '<label class="fieldLabel" for="delete-confirm-' + escapeHtml(item.id) + '" style="margin-top:0">' +
            'Type "' + escapeHtml(item.id) + '" to confirm deletion' +
          '</label>' +
          '<input id="delete-confirm-' + escapeHtml(item.id) + '" class="textField" type="text" placeholder="' + escapeHtml(item.id) + '" />' +
          '<div class="buttonGroup">' +
            '<button type="button" class="dangerButton smallButton" data-action="confirm-delete-card" data-drug-id="' + escapeHtml(item.id) + '">Confirm Delete</button>' +
            '<button type="button" class="ghostButton smallButton" data-action="cancel-delete" data-drug-id="' + escapeHtml(item.id) + '">Cancel</button>' +
          '</div>' +
        '</div>';
    } else {
      html +=
        '<div class="drugCardActions">' +
          '<button type="button" class="primaryButton smallButton" data-action="edit-drug" data-drug-id="' + escapeHtml(item.id) + '">Edit</button>' +
          '<button type="button" class="dangerButton smallButton" data-action="start-delete" data-drug-id="' + escapeHtml(item.id) + '">Delete</button>' +
        '</div>';
    }

    html += '</div>';
    return html;
  }

  // ── Edit Form Handlers ───────────────────────────────

  function handleFormClick(event) {
    var collapseToggle = event.target.closest("[data-collapse-toggle]");
    if (collapseToggle) {
      var key = collapseToggle.getAttribute("data-collapse-toggle");
      state.collapsed[key] = !state.collapsed[key];
      var body = collapseToggle.closest(".sectionCard, .testCard, .crGroupCard");
      if (body) {
        var content = body.querySelector("[data-collapse-body]");
        if (content) {
          content.classList.toggle("isCollapsed", state.collapsed[key]);
        }
        collapseToggle.classList.toggle("isCollapsed", state.collapsed[key]);
      }
      return;
    }

    var target = event.target.closest("[data-action]");
    if (!target) return;

    var action = target.getAttribute("data-action");
    syncFormFromDom();

    if (action === "add-alias") {
      state.form.aliases.push("");
      renderForm();
      return;
    }

    if (action === "remove-alias") {
      var index = Number(target.getAttribute("data-index"));
      state.form.aliases.splice(index, 1);
      if (!state.form.aliases.length) state.form.aliases.push("");
      renderForm();
      return;
    }

    if (action === "add-source-entry") {
      var testKind = target.getAttribute("data-test-kind");
      state.form.tests[testKind].sourceEntries.push({
        sourceId: state.defaultSourceId || "",
        concentration: "",
        maxConcentration: "",
        isPreferred: false,
      });
      renderForm();
      return;
    }

    if (action === "remove-source-entry") {
      var testKind = target.getAttribute("data-test-kind");
      var index = Number(target.getAttribute("data-index"));
      state.form.tests[testKind].sourceEntries.splice(index, 1);
      var entries = state.form.tests[testKind].sourceEntries;
      if (entries.length && !entries.some(function (e) { return e.isPreferred; })) {
        entries[0].isPreferred = true;
      }
      renderForm();
      return;
    }

    if (action === "set-preferred-source-entry") {
      var testKind = target.getAttribute("data-test-kind");
      var index = Number(target.getAttribute("data-index"));
      state.form.tests[testKind].sourceEntries.forEach(function (e, i) {
        e.isPreferred = (i === index);
      });
      renderForm();
      return;
    }

    if (action === "add-note") {
      var testKind = target.getAttribute("data-test-kind");
      state.form.tests[testKind].notes.push({ kind: "info", value: { en: "", fr: "" } });
      renderForm();
      return;
    }

    if (action === "remove-note") {
      var testKind = target.getAttribute("data-test-kind");
      var index = Number(target.getAttribute("data-index"));
      state.form.tests[testKind].notes.splice(index, 1);
      renderForm();
      return;
    }

    if (action === "add-source") {
      state.form.sources.push(emptySource());
      renderForm();
      return;
    }

    if (action === "remove-source") {
      var index = Number(target.getAttribute("data-index"));
      state.form.sources.splice(index, 1);
      renderForm();
      return;
    }

    if (action === "add-cr-group") {
      state.form.crossReactivity.push(emptyCrGroup());
      renderForm();
      return;
    }

    if (action === "remove-cr-group") {
      var gi = Number(target.getAttribute("data-group-index"));
      state.form.crossReactivity.splice(gi, 1);
      renderForm();
      return;
    }

    if (action === "add-cr-entry") {
      var gi = Number(target.getAttribute("data-group-index"));
      state.form.crossReactivity[gi].entries.push(emptyCrEntry());
      renderForm();
      return;
    }

    if (action === "remove-cr-entry") {
      var gi = Number(target.getAttribute("data-group-index"));
      var ei = Number(target.getAttribute("data-entry-index"));
      state.form.crossReactivity[gi].entries.splice(ei, 1);
      renderForm();
      return;
    }

    if (action === "delete-drug") {
      handleDelete();
    }
  }

  function handleFormChange(event) {
    var target = event.target;
    if (!target) return;

    if (
      target.matches("[data-test-enabled]") ||
      target.matches("[data-source-field]") ||
      target.matches("[data-source-entry]")
    ) {
      syncFormFromDom();
      maybeUpdateDiscrepancyNotes();
      renderForm();
    }
  }

  function maybeUpdateDiscrepancyNotes() {
    state.testKinds.forEach(function (testKind) {
      if (state.form.applicableTests.indexOf(testKind) === -1) return;
      maybeInjectDiscrepancyNote(testKind);
    });
  }

  function maybeInjectDiscrepancyNote(testKind) {
    var test = state.form.tests[testKind];
    var MARKER = "<!-- discrepancy-auto -->";

    test.notes = test.notes.filter(function (note) {
      return note.value.en.indexOf(MARKER) === -1;
    });

    var preferredEntry = test.sourceEntries.find(function (e) { return e.isPreferred; });
    var nonPreferred = test.sourceEntries.filter(function (e) { return !e.isPreferred; });
    var hasDiscrepancy = nonPreferred.some(function (e) {
      return e.concentration && e.concentration !== (preferredEntry && preferredEntry.concentration);
    });

    if (!hasDiscrepancy || !preferredEntry) return;

    var allSources = combinedSources();
    function labelFor(id) {
      var src = allSources.find(function (s) { return s.id === id; });
      return src ? (src.label || src.id) : id;
    }

    var lines = test.sourceEntries.map(function (e) {
      return labelFor(e.sourceId) + ": " + (e.concentration || "—") + (e.isPreferred ? " (preferred)" : "");
    });
    var linesFr = test.sourceEntries.map(function (e) {
      return labelFor(e.sourceId) + " : " + (e.concentration || "—") + (e.isPreferred ? " (prefere)" : "");
    });

    test.notes.push({
      kind: "warning",
      value: {
        en: MARKER + "Concentration discrepancy between sources — " + lines.join("; ") + ". Verify and update this note as needed.",
        fr: MARKER + "Discordance de concentration entre les sources — " + linesFr.join(" ; ") + ". Verifier et mettre a jour cette note si necessaire.",
      },
    });
  }

  function handleSave(event) {
    event.preventDefault();
    syncFormFromDom();
    state.validation = validateForm(state.form);
    renderForm();

    if (hasValidationErrors(state.validation)) {
      setEditStatus("Fix the validation issues before saving.", "error");
      return;
    }

    elements.saveButton.disabled = true;
    setEditStatus("Saving to Google Sheets…", "info");

    google.script.run
      .withSuccessHandler(function (payload) {
        state.lookups = payload.lookups || state.lookups;
        state.sources = payload.sources || state.sources;
        state.allData = payload.allData || state.allData;
        var savedId = payload.savedId || state.form.id.trim();
        var drug = assembleDrugFromCache(savedId);
        state.mode = "edit";
        state.originalId = savedId;
        state.form = normalizeLoadedDrug(drug);
        state.validation = emptyValidation();
        state.deleteConfirmation = "";
        elements.saveButton.disabled = false;
        setEditStatus(payload.message, "success");
        renderForm();
      })
      .withFailureHandler(function (error) {
        elements.saveButton.disabled = false;
        setEditStatus(
          error && error.message ? error.message : "The admin app could not complete the request.",
          "error"
        );
      })
      .saveDrugFromAdmin({
        originalId: state.originalId,
        drug: sanitizeDrugForSave(state.form),
        sources: sanitizeSourcesForSave(state.form.sources),
      });
  }

  function handleDelete() {
    syncFormFromDom();

    if (state.mode !== "edit" || !state.originalId) return;

    if (state.deleteConfirmation !== state.originalId) {
      state.validation.fields["delete-confirmation"] =
        "Type the current drug id exactly before deleting.";
      renderForm();
      setEditStatus("Delete confirmation does not match the current drug id.", "error");
      return;
    }

    state.validation = emptyValidation();
    renderForm();
    setEditStatus("Deleting from Google Sheets…", "info");

    google.script.run
      .withSuccessHandler(function (payload) {
        state.lookups = payload.lookups || state.lookups;
        state.sources = payload.sources || state.sources;
        state.allData = payload.allData || state.allData;
        state.mode = "create";
        state.originalId = "";
        state.form = emptyDrug(state.defaultSourceId);
        state.validation = emptyValidation();
        state.deleteConfirmation = "";
        setStatus(payload.message, "success");
        showListView();
      })
      .withFailureHandler(function (error) {
        setEditStatus(
          error && error.message ? error.message : "Delete failed.",
          "error"
        );
      })
      .deleteDrugFromAdmin({
        drugId: state.originalId,
        confirmation: state.deleteConfirmation,
      });
  }

  // ── Sync Form from DOM ───────────────────────────────

  function syncFormFromDom() {
    if (!state.form || !document.getElementById("drug-id")) return;

    var nextForm = cloneDrug(state.form);
    nextForm.id = readValue("drug-id");
    nextForm.name.fr = readValue("name-fr");
    nextForm.name.en = readValue("name-en");
    nextForm.className.fr = readValue("class-fr");
    nextForm.className.en = readValue("class-en");
    nextForm.subclassName.fr = readValue("subclass-fr");
    nextForm.subclassName.en = readValue("subclass-en");
    nextForm.aliases = Array.from(document.querySelectorAll("[data-alias-row]")).map(function (row) {
      var input = row.querySelector("input");
      return input ? input.value : "";
    });

    nextForm.applicableTests = state.testKinds.filter(function (testKind) {
      var input = document.getElementById("test-enabled-" + testKind);
      return input ? input.checked : nextForm.applicableTests.indexOf(testKind) >= 0;
    });

    state.testKinds.forEach(function (testKind) {
      nextForm.tests[testKind] = cloneTest(nextForm.tests[testKind] || emptyTest(state.defaultSourceId));

      var dilutions = document.getElementById("test-" + testKind + "-dilutions");
      var vehicleFr = document.getElementById("test-" + testKind + "-vehicle-fr");
      var vehicleEn = document.getElementById("test-" + testKind + "-vehicle-en");

      if (dilutions) nextForm.tests[testKind].dilutions = dilutions.value;

    nextForm.sources = Array.from(document.querySelectorAll("[data-source-row]")).map(function (row) {

        status: readNestedField(row, '[data-source-field="status"]'),
        url: readNestedField(row, '[data-source-field="url"]'),

  // ── Form Rendering ───────────────────────────────────

  function renderForm() {
    if (!state.form) return;

    elements.modeTitle.textContent =
      state.mode === "edit" ? "Edit " + state.originalId : "Create a new drug";

    elements.formSections.innerHTML =
      renderValidationSummary() +
      renderCoreSection() +
      renderAliasesSection() +
      renderApplicableTestsSection() +
      renderTestsSection() +
      renderCrossReactivitySection() +
      renderSourcesSection() +
      renderDeleteSection();

    initComboboxes();

  function renderValidationSummary() {
    var messages = validationMessages();
    if (!messages.length) return "";

    return (
      '<section class="sectionCard validationSummary">' +
      "<h3>Validation summary</h3>" +
      "<ul>" +
      messages.map(function (m) { return "<li>" + escapeHtml(m) + "</li>"; }).join("") +
      "</ul></section>"
    );
  }

  function collectUniqueValues(field) {
    var seen = {};
    var values = [];
    state.lookups.forEach(function (item) {
      var parts = field.split(".");
      var obj = item;
      for (var i = 0; i < parts.length; i++) {
        obj = obj && obj[parts[i]];
      }
      var val = (obj || "").trim();
      if (val && !seen[val]) {
        seen[val] = true;
        values.push(val);
      }
    });
    values.sort(function (a, b) {
      return a.localeCompare(b, undefined, { sensitivity: "base" });
    });
    return values;
  }

  function comboField(label, id, value, optionsArray, hint) {
    var error = state.validation.fields[id];
    var controlClass = error ? " hasError" : "";
    var errorMarkup = error ? '<div class="fieldError">' + escapeHtml(error) + "</div>" : "";
    var hintMarkup = hint ? '<div class="fieldHint">' + escapeHtml(hint) + "</div>" : "";

    return (
      '<div class="fieldBlock"><label class="fieldLabel" for="' + escapeHtml(id) + '">' + escapeHtml(label) + "</label>" +
      '<div class="comboWrap" data-combo-id="' + escapeHtml(id) + '">' +
      '<input id="' + escapeHtml(id) + '" class="textField' + controlClass + '" type="text" value="' + escapeHtml(value || "") + '" autocomplete="off" data-combo-input />' +
      '<button type="button" class="comboToggle" data-combo-toggle tabindex="-1">&#9662;</button>' +
      '<div class="comboDropdown" data-combo-dropdown>' +
      comboDropdownItems(optionsArray, value) +
      "</div></div>" +
      hintMarkup + errorMarkup + "</div>"
    );
  }

  function comboDropdownItems(options, filter) {
    var q = normalize(filter || "");
    var filtered = options.filter(function (opt) {
      return !q || normalize(opt).indexOf(q) >= 0;
    });
    if (!filtered.length) {
      return '<div class="comboEmpty">No matches</div>';
    }
    return filtered.map(function (opt) {
      return '<div class="comboOption" data-combo-value="' + escapeHtml(opt) + '">' + escapeHtml(opt) + '</div>';
    }).join("");
  }

  function initComboboxes() {
    document.querySelectorAll("[data-combo-id]").forEach(function (wrap) {
      var input = wrap.querySelector("[data-combo-input]");
      var toggle = wrap.querySelector("[data-combo-toggle]");
      var dropdown = wrap.querySelector("[data-combo-dropdown]");
      if (!input || !dropdown) return;

      var comboId = wrap.getAttribute("data-combo-id");
      var options = getComboOptions(comboId);

      function open() {
        dropdown.innerHTML = comboDropdownItems(options, input.value);
        dropdown.classList.add("isOpen");
      }

      function close() {
        dropdown.classList.remove("isOpen");
      }

      function isOpen() {
        return dropdown.classList.contains("isOpen");
      }

      input.addEventListener("focus", function () { open(); });
      input.addEventListener("input", function () { open(); });

      if (toggle) {
        toggle.addEventListener("mousedown", function (e) {
          e.preventDefault();
          if (isOpen()) { close(); } else { input.focus(); open(); }
        });
      }

      dropdown.addEventListener("mousedown", function (e) {
        var target = e.target.closest("[data-combo-value]");
        if (!target) return;
        e.preventDefault();
        input.value = target.getAttribute("data-combo-value");
        close();
        input.dispatchEvent(new Event("change", { bubbles: true }));
      });

      input.addEventListener("blur", function () {
        setTimeout(close, 150);
      });

      input.addEventListener("keydown", function (e) {
        if (!isOpen()) return;
        var items = dropdown.querySelectorAll(".comboOption");
        var active = dropdown.querySelector(".comboOption.isActive");
        var index = -1;
        items.forEach(function (item, i) { if (item === active) index = i; });

        if (e.key === "ArrowDown") {
          e.preventDefault();
          if (active) active.classList.remove("isActive");
          index = (index + 1) % items.length;
          items[index].classList.add("isActive");
          items[index].scrollIntoView({ block: "nearest" });
        } else if (e.key === "ArrowUp") {
          e.preventDefault();
          if (active) active.classList.remove("isActive");
          index = (index - 1 + items.length) % items.length;
          items[index].classList.add("isActive");
          items[index].scrollIntoView({ block: "nearest" });
        } else if (e.key === "Enter" && active) {
          e.preventDefault();
          input.value = active.getAttribute("data-combo-value");
          close();
          input.dispatchEvent(new Event("change", { bubbles: true }));
        } else if (e.key === "Escape") {
          close();
        }
      });
    });
  }

  function getComboOptions(comboId) {
    var map = {
      "class-fr": "className.fr",
      "class-en": "className.en",
      "subclass-fr": "subclassName.fr",
      "subclass-en": "subclassName.en",
    };
    var field = map[comboId];
    return field ? collectUniqueValues(field) : [];
  }

  function collapsibleSection(key, headHtml, bodyHtml, opts) {
    var tag = (opts && opts.tag) || "section";
    var extraClass = (opts && opts.className) || "";
    var isCollapsed = state.collapsed[key];
    var chevron = isCollapsed ? "&#9654;" : "&#9660;";
    var collapseClass = isCollapsed ? " isCollapsed" : "";

    return (
      "<" + tag + ' class="sectionCard ' + extraClass + '">' +
      '<div class="sectionHead">' +
      '<button type="button" class="collapseToggle' + collapseClass + '" data-collapse-toggle="' + escapeHtml(key) + '">' +
      '<span class="collapseChevron">' + chevron + "</span>" +
      "</button>" +
      headHtml +
      "</div>" +
      '<div data-collapse-body class="collapseBody' + collapseClass + '">' +
      bodyHtml +
      "</div>" +
      "</" + tag + ">"
    );
  }

      comboField("French subclass", "subclass-fr", state.form.subclassName.fr, subclassesFr, "Optional. Select existing or type a new subclass") +
      comboField("English subclass", "subclass-en", state.form.subclassName.en, subclassesEn, "Optional. Select existing or type a new subclass") +

  function renderTestCard(testKind, test) {

      "</div>" +
      sourceField("Document / Reference URL", "source-url-" + index, source.url || "", "text", index, "url") +
      '<div class="grid3">' +
      sourceField("Document name (FR)", "source-document-name-fr-" + index, source.documentName.fr, "text", index, "document-name-fr") +
      sourceField("Document name (EN)", "source-document-name-en-" + index, source.documentName.en, "text", index, "document-name-en") +
      sourceField("Excerpt (FR)", "source-excerpt-fr-" + index, source.excerpt.fr, "textarea", index, "excerpt-fr") +
      sourceField("Excerpt (EN)", "source-excerpt-en-" + index, source.excerpt.en, "textarea", index, "excerpt-en") +
      "</div></article>"
    );
  }

  function renderDeleteSection() {
    if (state.mode !== "edit" || !state.originalId) return "";

    return collapsibleSection("delete",
      "<div>" +
      "<h3>Delete</h3>" +
      '<p class="sectionIntro">This permanently deletes the drug row and its linked aliases, test entries, notes, and cross-reactivity data. Sources stay in place.</p>' +
      "</div>" +
      '<span class="pill dangerPill">Permanent</span>',

      field('Type "' + state.originalId + '" to confirm', "delete-confirmation", state.deleteConfirmation, "text") +
      '<div class="actionRow dangerActions">' +
      '<button type="button" class="dangerButton" data-action="delete-drug">Delete drug</button>' +
      "</div>",
      { className: "dangerSection" }
    );
  }

  // ── Field Helpers ────────────────────────────────────

  function field(label, id, value, kind, hint, extraAttributes) {
    var attributes = extraAttributes ? " " + extraAttributes : "";
    var hintMarkup = hint ? '<div class="fieldHint">' + escapeHtml(hint) + "</div>" : "";
    var error = state.validation.fields[id];
    var controlClass = error ? " hasError" : "";
    var errorMarkup = error ? '<div class="fieldError">' + escapeHtml(error) + "</div>" : "";

    if (kind === "select") {
      return (
        '<div class="fieldBlock"><label class="fieldLabel" for="' + escapeHtml(id) + '">' + escapeHtml(label) + "</label>" +
        '<select id="' + escapeHtml(id) + '" class="selectField' + controlClass + '"' + attributes + ">" + value + "</select>" +
        hintMarkup + errorMarkup + "</div>"
      );
    }

    if (kind === "textarea") {
      return (
        '<div class="fieldBlock"><label class="fieldLabel" for="' + escapeHtml(id) + '">' + escapeHtml(label) + "</label>" +
        '<textarea id="' + escapeHtml(id) + '" class="textArea' + controlClass + '"' + attributes + ">" + escapeHtml(value || "") + "</textarea>" +
        hintMarkup + errorMarkup + "</div>"
      );
    }

    return (
      '<div class="fieldBlock"><label class="fieldLabel" for="' + escapeHtml(id) + '">' + escapeHtml(label) + "</label>" +
      '<input id="' + escapeHtml(id) + '" class="textField' + controlClass + '" type="' + escapeHtml(kind || "text") + '" value="' + escapeHtml(value || "") + '"' + attributes + " />" +
      hintMarkup + errorMarkup + "</div>"
    );
  }

  function sourceField(label, id, value, kind, index, sourceFieldName) {
    return field(label, id, value, kind, "", 'data-source-field="' + escapeHtml(sourceFieldName) + '" data-source-index="' + index + '"');
  }

  function sourceOptions(selectedId) {
    var options = [];
    var sources = combinedSources();

    sources.forEach(function (source) {
      var selected = source.id === selectedId ? ' selected="selected"' : "";
      var label = source.id + " · " + (source.label || source.documentName.fr || source.documentName.en || source.organization);
      options.push('<option value="' + escapeHtml(source.id) + '"' + selected + ">" + escapeHtml(label) + "</option>");
    });

    return options.join("");
  }

  function noteKindOptions(selectedValue) {
    return state.noteKinds.map(function (kind) {
      var selected = kind === selectedValue ? ' selected="selected"' : "";
      return '<option value="' + escapeHtml(kind) + '"' + selected + ">" + escapeHtml(kind) + "</option>";
    }).join("");
  }

  function drugIdOptions(selectedId) {
    var options = ['<option value="">-- Select drug --</option>'];
    state.lookups.forEach(function (item) {
      var selected = item.id === selectedId ? ' selected="selected"' : "";
      var label = item.id + " · " + (item.name.fr || item.name.en || item.id);
      options.push('<option value="' + escapeHtml(item.id) + '"' + selected + ">" + escapeHtml(label) + "</option>");
    });
    return options.join("");
  }

  function tierOptions(selectedValue) {
    return state.crossReactivityTiers.map(function (tier) {
      var selected = tier === selectedValue ? ' selected="selected"' : "";
      return '<option value="' + escapeHtml(tier) + '"' + selected + ">" + escapeHtml(tier) + "</option>";
    }).join("");
  }

  function structuralRelationOptions(selectedValue) {
    return state.structuralRelations.map(function (rel) {
      var selected = rel === selectedValue ? ' selected="selected"' : "";
      return '<option value="' + escapeHtml(rel) + '"' + selected + ">" + escapeHtml(rel) + "</option>";
    }).join("");
  }

  // ── Search / Filter ──────────────────────────────────

  function filteredLookups(normalizedQuery) {
    var items = state.lookups.slice();

    if (!normalizedQuery) return items;

    return items
      .map(function (item) {
        return { item: item, score: scoreLookup(item, normalizedQuery) };
      })
      .filter(function (entry) { return entry.score > 0; })
      .sort(function (left, right) {
        if (right.score !== left.score) return right.score - left.score;
        return (left.item.name.fr || left.item.id).localeCompare(right.item.name.fr || right.item.id);
      })
      .map(function (entry) { return entry.item; });
  }

  function scoreLookup(item, normalizedQuery) {
    var names = [
      { value: normalize(item.id), score: 180 },
      { value: normalize(item.name.fr), score: 170 },
      { value: normalize(item.name.en), score: 160 },
      { value: normalize(item.className.fr), score: 90 },
      { value: normalize(item.className.en), score: 80 },
      { value: item.subclassName ? normalize(item.subclassName.fr) : "", score: 70 },
      { value: item.subclassName ? normalize(item.subclassName.en) : "", score: 60 },
    ];

    var best = 0;
    names.forEach(function (candidate) {
      if (!candidate.value) return;
      if (candidate.value === normalizedQuery) {
        best = Math.max(best, 300 + candidate.score);
      } else if (candidate.value.indexOf(normalizedQuery) === 0) {
        best = Math.max(best, 200 + candidate.score);
      } else if (candidate.value.indexOf(normalizedQuery) >= 0) {
        best = Math.max(best, 100 + candidate.score);
      }
    });

    return best;
  }

  // ── Validation ───────────────────────────────────────

  function validateForm(form) {
    var validation = emptyValidation();
    var existingDrugIds = new Set(state.lookups.map(function (l) { return l.id; }));
    var applicableTests = form.applicableTests.slice();
    var draftSourceResult = validateDraftSources(form.sources);
    var availableSourceIds = new Set(
      combinedSources().map(function (s) { return s.id; }).filter(Boolean)
    );
    var usedSourceIds = {};

    Object.assign(validation.fields, draftSourceResult.fields);

    if (!form.id.trim()) {
      validation.fields["drug-id"] = "Drug id is required.";
    } else if (form.id !== state.originalId && existingDrugIds.has(form.id)) {
      validation.fields["drug-id"] = "Drug id already exists.";
    }

    if (!form.name.fr.trim()) validation.fields["name-fr"] = "French name is required.";
    if (!form.name.en.trim()) validation.fields["name-en"] = "English name is required.";
    if (!form.className.fr.trim()) validation.fields["class-fr"] = "French class is required.";
    if (!form.className.en.trim()) validation.fields["class-en"] = "English class is required.";

    if (Boolean(form.subclassName.fr.trim()) !== Boolean(form.subclassName.en.trim())) {
      validation.fields["subclass-fr"] = "Subclass must be provided in both French and English.";
      validation.fields["subclass-en"] = "Subclass must be provided in both French and English.";
    }

    var aliasValues = form.aliases.map(function (a) { return a.trim(); }).filter(Boolean);
    if (!aliasValues.length) validation.fields["alias-0"] = "At least one alias is required.";

    if (!applicableTests.length) validation.fields["applicable-tests"] = "Select at least one applicable test type.";

    applicableTests.forEach(function (testKind) {
      var test = form.tests[testKind];

      if (!hasMeaningfulTestContent(test)) {
        validation.fields["test-" + testKind + "-source-entries"] =
          "Add at least one clinical field, dilution, bilingual vehicle, or note for " + testKind.toUpperCase() + ".";
      }

      var preferredCount = test.sourceEntries.filter(function (e) { return e.isPreferred; }).length;
      if (test.sourceEntries.length > 0 && preferredCount !== 1) {
        validation.fields["test-" + testKind + "-source-entries"] =
          "Exactly one preferred source is required for " + testKind.toUpperCase() + ".";
      }

      var seenEntryIds = {};
      test.sourceEntries.forEach(function (entry, index) {
        if (!entry.sourceId) {
          validation.fields["test-" + testKind + "-source-entry-source-" + index] = "Source is required.";
        } else if (!availableSourceIds.has(entry.sourceId)) {
          validation.fields["test-" + testKind + "-source-entry-source-" + index] = "Source id is not available in the source catalog.";
        } else {
          usedSourceIds[entry.sourceId] = true;
        }
        if (seenEntryIds[entry.sourceId]) {
          validation.fields["test-" + testKind + "-source-entry-source-" + index] = "Duplicate source in " + testKind.toUpperCase() + ".";
        }
        if (entry.sourceId) seenEntryIds[entry.sourceId] = true;
      });

      if (Boolean(test.vehicle.fr.trim()) !== Boolean(test.vehicle.en.trim())) {
        validation.fields["test-" + testKind + "-vehicle-fr"] = "Vehicle must be provided in French and English.";
        validation.fields["test-" + testKind + "-vehicle-en"] = "Vehicle must be provided in French and English.";
      }

      if (test.dilutions.trim()) {
        var dilutions = test.dilutions.split(";").map(function (i) { return i.trim(); }).filter(Boolean);
        var invalidDilution = dilutions.find(function (d) { return !/^[1-9]\d*:[1-9]\d*$/.test(d); });
        if (invalidDilution) {
          validation.fields["test-" + testKind + "-dilutions"] = 'Dilutions must use positive ratios like "1:10".';
        }
      }

      test.notes.forEach(function (note, index) {
        if (state.noteKinds.indexOf(note.kind) === -1) {
          validation.fields["test-" + testKind + "-note-kind-" + index] = "Invalid note type.";
        }
        var hasFrench = note.value.fr.trim().length > 0;
        var hasEnglish = note.value.en.trim().length > 0;
        if (hasFrench !== hasEnglish) {
          validation.fields["test-" + testKind + "-note-fr-" + index] = "Notes must be bilingual.";
          validation.fields["test-" + testKind + "-note-en-" + index] = "Notes must be bilingual.";
        }
      });
    });

    if (!Object.keys(usedSourceIds).length) {
      validation.form.push("At least one valid source must be attached to a selected test.");
    }

    validateCrossReactivity(form, validation);

    return validation;
  }

  function validateCrossReactivity(form, validation) {
    var groups = form.crossReactivity || [];
    var drugIds = new Set(state.lookups.map(function (l) { return l.id; }));

    groups.forEach(function (group, gi) {
      if (!group.groupName.fr.trim() || !group.groupName.en.trim()) {
        validation.fields["cr-group-name-fr-" + gi] = "Bilingual group name is required.";
        validation.fields["cr-group-name-en-" + gi] = "Bilingual group name is required.";
      }

      var panelRatEn = group.panelRationale.en.trim();
      var panelRatFr = group.panelRationale.fr.trim();
      if (Boolean(panelRatEn) !== Boolean(panelRatFr)) {
        validation.fields["cr-panel-rat-fr-" + gi] = "Panel rationale must be bilingual.";
        validation.fields["cr-panel-rat-en-" + gi] = "Panel rationale must be bilingual.";
      }

      var entries = group.entries || [];
      if (!entries.length) {
        validation.form.push("Cross-reactivity group " + (gi + 1) + " must have at least one entry.");
      }

      entries.forEach(function (entry, ei) {
        if (!entry.relatedDrugId) {
          validation.fields["cr-entry-drug-" + gi + "-" + ei] = "Related drug id is required.";
        } else if (!drugIds.has(entry.relatedDrugId)) {
          validation.fields["cr-entry-drug-" + gi + "-" + ei] = "Unknown drug id.";
        }

        if (state.crossReactivityTiers.indexOf(entry.tier) === -1) {
          validation.fields["cr-entry-tier-" + gi + "-" + ei] = "Invalid tier.";
        }

        if (state.structuralRelations.indexOf(entry.structuralRelation) === -1) {
          validation.fields["cr-entry-struct-" + gi + "-" + ei] = "Invalid structural relation.";
        }

        var ratFr = (entry.rationale.fr || "").trim();
        var ratEn = (entry.rationale.en || "").trim();
        if (!ratFr || !ratEn) {
          validation.fields["cr-entry-rat-fr-" + gi + "-" + ei] = "Bilingual rationale is required.";
          validation.fields["cr-entry-rat-en-" + gi + "-" + ei] = "Bilingual rationale is required.";
        }
      });
    });
  }

  function validateDraftSources(sources) {
    var result = { fields: {}, valid: [] };
    var existingSourceIds = new Set(state.sources.map(function (s) { return s.id; }));
    var seenDraftIds = {};

    sources.forEach(function (source, index) {
      if (isBlankSource(source)) return;
      var prefix = "source-";

      if (!source.id.trim()) {
        result.fields[prefix + "id-" + index] = "Source id is required.";
      } else if (existingSourceIds.has(source.id.trim())) {
        result.fields[prefix + "id-" + index] = "Source id already exists.";
      } else if (seenDraftIds[source.id.trim()]) {
        result.fields[prefix + "id-" + index] = "Source id is duplicated in this draft.";
      } else {
        seenDraftIds[source.id.trim()] = true;
      }

      if (!source.label.trim()) result.fields[prefix + "label-" + index] = "Label is required.";
      if (!source.organization.trim()) result.fields[prefix + "organization-" + index] = "Organization is required.";
      if (!source.year.trim()) result.fields[prefix + "year-" + index] = "Year is required.";
      if (!source.version.trim()) result.fields[prefix + "version-" + index] = "Version is required.";
      if (!source.status.trim()) result.fields[prefix + "status-" + index] = "Status is required.";
      if (!source.documentName.fr.trim()) result.fields[prefix + "document-name-fr-" + index] = "French document name is required.";
      if (!source.documentName.en.trim()) result.fields[prefix + "document-name-en-" + index] = "English document name is required.";
      if (!source.excerpt.fr.trim()) result.fields[prefix + "excerpt-fr-" + index] = "French excerpt is required.";
      if (!source.excerpt.en.trim()) result.fields[prefix + "excerpt-en-" + index] = "English excerpt is required.";

      result.valid.push(source);
    });

    return result;
  }

  function hasValidationErrors(validation) {
    return Boolean(validation.form.length || Object.keys(validation.fields).length);
  }

  function validationMessages() {
    var messages = state.validation.form.slice();
    Object.keys(state.validation.fields).forEach(function (fieldId) {
      var message = state.validation.fields[fieldId];
      if (messages.indexOf(message) === -1) messages.push(message);
    });
    return messages;
  }

  // ── Data Helpers ─────────────────────────────────────

  function combinedSources() {
    var existing = state.sources.slice();
    var draftSources = state.form
      ? state.form.sources.filter(function (s) { return s.id && !isBlankSource(s); })
      : [];
    var seen = {};

    return existing.concat(draftSources).filter(function (source) {
      if (!source.id || seen[source.id]) return false;
      seen[source.id] = true;
      return true;
    });
  }

  function sanitizeDrugForSave(form) {
    var MARKER = "<!-- discrepancy-auto -->";
    return {
      id: form.id.trim(),
      name: { fr: form.name.fr.trim(), en: form.name.en.trim() },
      className: { fr: form.className.fr.trim(), en: form.className.en.trim() },
      subclassName: { fr: form.subclassName.fr.trim(), en: form.subclassName.en.trim() },
      aliases: form.aliases.slice(),
      applicableTests: form.applicableTests.slice(),
      tests: Object.fromEntries(
        state.testKinds.map(function (testKind) {
          return [testKind, {
            dilutions: form.tests[testKind].dilutions,
            vehicle: { fr: form.tests[testKind].vehicle.fr, en: form.tests[testKind].vehicle.en },
            sourceEntries: form.tests[testKind].sourceEntries.map(function (entry) {
              return {
                sourceId: entry.sourceId,
                concentration: entry.concentration,
                maxConcentration: entry.maxConcentration,
                isPreferred: entry.isPreferred,
              };
            }),
            notes: form.tests[testKind].notes.map(function (note) {
              return {
                kind: note.kind,
                value: {
                  fr: note.value.fr.replace(MARKER, "").trim(),
                  en: note.value.en.replace(MARKER, "").trim(),
                },
              };
            }),
          }];
        })
      ),
      crossReactivity: (form.crossReactivity || []).map(function (group) {
        return {
          groupName: {
            fr: group.groupName.fr.trim(),
            en: group.groupName.en.trim(),
          },
          entries: group.entries.map(function (entry) {
            return {
              relatedDrugId: (entry.relatedDrugId || "").trim(),
              tier: (entry.tier || "").trim(),
              structuralRelation: (entry.structuralRelation || "").trim(),
              rationale: {
                fr: (entry.rationale.fr || "").trim(),
                en: (entry.rationale.en || "").trim(),
              },
              sourceIds: typeof entry.sourceIds === "string" ? entry.sourceIds.trim() : (Array.isArray(entry.sourceIds) ? entry.sourceIds.join("; ") : ""),
            };
          }),
          suggestedPanel: typeof group.suggestedPanel === "string" ? group.suggestedPanel.trim() : (Array.isArray(group.suggestedPanel) ? group.suggestedPanel.join("; ") : ""),
          panelRationale: {
            fr: (group.panelRationale.fr || "").trim(),
            en: (group.panelRationale.en || "").trim(),
          },
        };
      }),
    };
  }

  function sanitizeSourcesForSave(sources) {
    return sources.filter(function (source) { return !isBlankSource(source); });
  }

  function normalizeLoadedDrug(drug) {
    var normalized = emptyDrug(state.defaultSourceId);
    if (!drug) return normalized;

    normalized.id = drug.id || "";
    normalized.name.fr = (drug.name && drug.name.fr) || "";
    normalized.name.en = (drug.name && drug.name.en) || "";
    normalized.className.fr = (drug.className && drug.className.fr) || "";
    normalized.className.en = (drug.className && drug.className.en) || "";
    normalized.subclassName.fr = (drug.subclassName && drug.subclassName.fr) || "";
    normalized.subclassName.en = (drug.subclassName && drug.subclassName.en) || "";
    normalized.aliases = Array.isArray(drug.aliases) && drug.aliases.length ? drug.aliases.slice() : [""];
    normalized.applicableTests =
      Array.isArray(drug.applicableTests) && drug.applicableTests.length
        ? drug.applicableTests.filter(function (tk) { return state.testKinds.indexOf(tk) >= 0; })
        : [];
    normalized.sources = [];

    state.testKinds.forEach(function (testKind) {
      var loadedTest = drug.tests && drug.tests[testKind] ? drug.tests[testKind] : emptyTest(state.defaultSourceId);
      normalized.tests[testKind] = {
        dilutions: loadedTest.dilutions || "",
        vehicle: {
          fr: (loadedTest.vehicle && loadedTest.vehicle.fr) || "",
          en: (loadedTest.vehicle && loadedTest.vehicle.en) || "",
        },
        sourceEntries: Array.isArray(loadedTest.sourceEntries) && loadedTest.sourceEntries.length
          ? loadedTest.sourceEntries.map(function (entry) {
              return {
                sourceId: (entry && entry.sourceId) || "",
                concentration: (entry && entry.concentration) || "",
                maxConcentration: (entry && entry.maxConcentration) || "",
                isPreferred: Boolean(entry && entry.isPreferred),
              };
            })
          : [{ sourceId: state.defaultSourceId || "", concentration: "", maxConcentration: "", isPreferred: true }],
        notes: Array.isArray(loadedTest.notes)
          ? loadedTest.notes.map(function (note) {
              return { kind: note.kind || "info", value: { fr: (note.value && note.value.fr) || "", en: (note.value && note.value.en) || "" } };
            })
          : [],
      };
    });

    normalized.crossReactivity = Array.isArray(drug.crossReactivity)
      ? drug.crossReactivity.map(function (group) {
          return {
            groupName: {
              en: (group.groupName && group.groupName.en) || "",
              fr: (group.groupName && group.groupName.fr) || "",
            },
            entries: Array.isArray(group.entries) ? group.entries.map(function (entry) {
              return {
                relatedDrugId: entry.relatedDrugId || "",
                tier: entry.tier || "higher-concern",
                structuralRelation: entry.structuralRelation || "structurally-related",
                rationale: {
                  en: (entry.rationale && entry.rationale.en) || "",
                  fr: (entry.rationale && entry.rationale.fr) || "",
                },
                sourceIds: Array.isArray(entry.sourceIds) ? entry.sourceIds.slice() : [],
              };
            }) : [],
            suggestedPanel: Array.isArray(group.suggestedPanel) ? group.suggestedPanel.slice() : [],
            panelRationale: {
              en: (group.panelRationale && group.panelRationale.en) || "",
              fr: (group.panelRationale && group.panelRationale.fr) || "",
            },
          };
        })
      : [];

    return normalized;
  }

  // ── Empty / Clone Factories ──────────────────────────

  function emptyDrug(defaultSourceId) {
    var tests = {};
    state.testKinds.forEach(function (testKind) {
      tests[testKind] = emptyTest(defaultSourceId);
    });
    return {
      id: "",
      name: { en: "", fr: "" },
      className: { en: "", fr: "" },
      subclassName: { en: "", fr: "" },
      aliases: [""],
      applicableTests: [],
      sources: [],
      tests: tests,
      crossReactivity: [],
    };
  }

  function emptyTest(defaultSourceId) {
    return {
      dilutions: "",
      vehicle: { en: "", fr: "" },
      sourceEntries: [
        { sourceId: defaultSourceId || "", concentration: "", maxConcentration: "", isPreferred: true },
      ],
      notes: [],
    };
  }

  function emptySource() {
    return {
      id: "", label: "", organization: "", year: "", version: "", status: "", url: "",
      documentName: { en: "", fr: "" },
      excerpt: { en: "", fr: "" },
    };
  }

  function emptyCrGroup() {
    return {
      groupName: { en: "", fr: "" },
      entries: [emptyCrEntry()],
      suggestedPanel: [],
      panelRationale: { en: "", fr: "" },
    };
  }

  function emptyCrEntry() {
    return {
      relatedDrugId: "",
      tier: "higher-concern",
      structuralRelation: "structurally-related",
      rationale: { en: "", fr: "" },
      sourceIds: [],
    };
  }

  function emptyValidation() {
    return { fields: {}, form: [] };
  }

  function cloneDrug(drug) {
    return {
      id: drug.id,
      name: { fr: drug.name.fr, en: drug.name.en },
      className: { fr: drug.className.fr, en: drug.className.en },
      subclassName: { fr: drug.subclassName.fr, en: drug.subclassName.en },
      aliases: drug.aliases.slice(),
      applicableTests: drug.applicableTests.slice(),
      sources: drug.sources.map(cloneSource),
      tests: Object.fromEntries(
        state.testKinds.map(function (testKind) {
          return [testKind, cloneTest(drug.tests[testKind])];
        })
      ),
      crossReactivity: (drug.crossReactivity || []).map(cloneCrGroup),
    };
  }

  function cloneTest(test) {
    return {
      dilutions: test.dilutions,
      vehicle: { fr: test.vehicle.fr, en: test.vehicle.en },
      sourceEntries: test.sourceEntries.map(function (entry) {
        return {
          sourceId: entry.sourceId,
          concentration: entry.concentration,
          maxConcentration: entry.maxConcentration,
          isPreferred: entry.isPreferred,
        };
      }),
      notes: test.notes.map(function (note) {
        return { kind: note.kind, value: { fr: note.value.fr, en: note.value.en } };
      }),
    };
  }

  function cloneSource(source) {
    return {
      id: source.id, label: source.label, organization: source.organization,
      year: source.year, version: source.version, status: source.status,
      documentName: { fr: source.documentName.fr, en: source.documentName.en },
      excerpt: { fr: source.excerpt.fr, en: source.excerpt.en },
    };
  }

  function cloneCrGroup(group) {
    return {
      groupName: { en: group.groupName.en, fr: group.groupName.fr },
      entries: group.entries.map(function (entry) {
        return {
          relatedDrugId: entry.relatedDrugId,
          tier: entry.tier,
          structuralRelation: entry.structuralRelation,
          rationale: { en: entry.rationale.en, fr: entry.rationale.fr },
          sourceIds: Array.isArray(entry.sourceIds) ? entry.sourceIds.slice() : [],
        };
      }),
      suggestedPanel: Array.isArray(group.suggestedPanel) ? group.suggestedPanel.slice() : [],
      panelRationale: { en: group.panelRationale.en, fr: group.panelRationale.fr },
    };
  }

  function hasMeaningfulTestContent(test) {
    return Boolean(
      test.sourceEntries.some(function (e) {
        return (e.concentration && e.concentration.trim()) || (e.maxConcentration && e.maxConcentration.trim());
      }) ||
      test.dilutions.trim() ||
      (test.vehicle.fr.trim() && test.vehicle.en.trim()) ||
      test.notes.some(function (note) {
        return note.value.fr.trim() && note.value.en.trim();
      })
    );
  }

  function isBlankSource(source) {
    return !(
      source.id.trim() || source.label.trim() || source.organization.trim() ||
      source.year.trim() || source.version.trim() || source.status.trim() ||
      source.documentName.fr.trim() || source.documentName.en.trim() ||
      source.excerpt.fr.trim() || source.excerpt.en.trim()
    );
  }

  // ── DOM Utilities ────────────────────────────────────

  function readValue(id) {
    var input = document.getElementById(id);
    return input ? input.value : "";
  }

  function readNestedField(parent, selector) {
    var input = parent.querySelector(selector);
    return input ? input.value : "";
  }

  function setStatus(message, kind) {
    elements.statusBanner.textContent = message || "";
    elements.statusBanner.className = "statusBanner";
    if (!message) {
      elements.statusBanner.classList.add("isHidden");
      return;
    }
    if (kind === "success") elements.statusBanner.classList.add("isSuccess");
    else if (kind === "error") elements.statusBanner.classList.add("isError");
  }

  function setEditStatus(message, kind) {
    elements.editStatusBanner.textContent = message || "";
    elements.editStatusBanner.className = "statusBanner";
    if (!message) {
      elements.editStatusBanner.classList.add("isHidden");
      return;
    }
    if (kind === "success") elements.editStatusBanner.classList.add("isSuccess");
    else if (kind === "error") elements.editStatusBanner.classList.add("isError");
  }

  function applyUiText(uiText) {
    if (elements.listSubtitle && uiText && uiText.lookupBody) {
      elements.listSubtitle.textContent = uiText.lookupBody;
    }
    if (elements.actionNote && uiText && uiText.actionNote) {
      elements.actionNote.textContent = uiText.actionNote;
    }
  }

  function normalize(value) {
    return String(value || "")
      .normalize("NFD")
      .replace(/[̀-ͯ]/g, "")
      .toLowerCase()
      .replace(/[^a-z0-9]+/g, " ")
      .replace(/\s+/g, " ")
      .trim();
  }

  function escapeHtml(value) {
    return String(value || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }
})();
</script>
