<style>
:root {
  --bg: #eef4f8;
  --panel: #ffffff;
  --panel-muted: #f6f9fc;
  --border: #d8e2eb;
  --border-strong: #abc0d3;
  --text: #163042;
  --text-muted: #5a7282;
  --accent: #0b6aa8;
  --accent-strong: #084d7d;
  --success: #1d7d5e;
  --danger: #b54b4b;
  --danger-soft: rgba(181, 75, 75, 0.08);
  --shadow: 0 18px 45px rgba(24, 49, 74, 0.08);
  --radius-lg: 24px;
  --radius-md: 16px;
  --radius-sm: 12px;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  background:
    radial-gradient(circle at top left, rgba(83, 151, 203, 0.18), transparent 32%),
    linear-gradient(180deg, #f7fbfd 0%, var(--bg) 100%);
  color: var(--text);
  font: 15px/1.5 "Helvetica Neue", Helvetica, Arial, sans-serif;
}

button,
input,
select,
textarea {
  font: inherit;
}

code {
  font-family: "SFMono-Regular", Menlo, Monaco, Consolas, monospace;
}

/* ── Layout ─────────────────────────────────────────── */

.appShell {
  margin: 0 auto;
  padding: 20px;
  min-height: 100vh;
}

.viewPanel {
  background: rgba(255, 255, 255, 0.84);
  border: 1px solid rgba(216, 226, 235, 0.92);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow);
  backdrop-filter: blur(12px);
  padding: 28px;
}

.viewHeader {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 20px;
  margin-bottom: 24px;
}

.editorTitleGroup {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* ── Tab Bar ───────────────────────────────────────── */

.tabBar {
  display: flex;
  gap: 4px;
  margin-bottom: 20px;
  padding: 4px;
  background: rgba(255, 255, 255, 0.64);
  border: 1px solid var(--border);
  border-radius: 999px;
  width: fit-content;
}

.tabButton {
  border: 0;
  background: transparent;
  border-radius: 999px;
  padding: 10px 24px;
  font-size: 14px;
  font-weight: 700;
  color: var(--text-muted);
  cursor: pointer;
  transition: background 120ms ease, color 120ms ease;
}

.tabButton:hover {
  color: var(--text);
  background: rgba(11, 106, 168, 0.06);
}

.tabButton.isActive {
  background: var(--accent);
  color: #ffffff;
  box-shadow: 0 4px 12px rgba(11, 106, 168, 0.2);
}

/* ── Typography ─────────────────────────────────────── */

.eyebrow {
  margin: 0 0 8px;
  color: var(--accent);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

h1,
h2,
h3 {
  margin: 0;
  letter-spacing: -0.02em;
}

h1 { font-size: 28px; }
h2 { font-size: 24px; }
h3 { font-size: 18px; }

.subtitleText,
.fieldHint,
.actionNote,
.listMeta,
.emptyState,
.statusBanner,
.sectionIntro,
.sourceReferenceMeta {
  color: var(--text-muted);
}

/* ── List Toolbar ───────────────────────────────────── */

.listToolbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.searchField {
  flex: 1;
  min-width: 240px;
}

.listMeta {
  margin-bottom: 16px;
  font-size: 13px;
}

/* ── Card Grid ──────────────────────────────────────── */

.cardGrid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
}

.drugCard {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 18px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  transition: border-color 120ms ease, transform 120ms ease;
}

.drugCard:hover {
  border-color: var(--accent);
  transform: translateY(-1px);
}

.drugCard.isDeleting {
  border-color: var(--danger);
  background: linear-gradient(180deg, rgba(255, 248, 248, 0.96), #ffffff 100%);
}

.drugCardHeader {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
}

.drugCardName {
  font-size: 16px;
  font-weight: 700;
  margin: 0;
}

.drugCardMeta {
  color: var(--text-muted);
  font-size: 13px;
  line-height: 1.4;
}

.drugCardActions {
  display: flex;
  gap: 8px;
  margin-top: auto;
  padding-top: 4px;
}

.drugCardDeleteConfirm {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding-top: 8px;
  border-top: 1px solid rgba(181, 75, 75, 0.2);
}

.drugCardDeleteConfirm .buttonGroup {
  justify-content: flex-start;
}

/* ── Form Controls ──────────────────────────────────── */

.fieldLabel {
  display: block;
  margin: 18px 0 8px;
  font-size: 13px;
  font-weight: 700;
}

.textField,
.textArea,
.selectField {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--panel);
  color: var(--text);
  padding: 12px 14px;
  transition: border-color 120ms ease, box-shadow 120ms ease;
}

.textArea {
  min-height: 92px;
  resize: vertical;
}

.textField:focus,
.textArea:focus,
.selectField:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 4px rgba(11, 106, 168, 0.12);
  outline: none;
}

.textField.hasError,
.textArea.hasError,
.selectField.hasError {
  border-color: var(--danger);
  background: rgba(181, 75, 75, 0.03);
}

.fieldBlock {
  min-width: 0;
}

.fieldError {
  margin-top: 8px;
  color: var(--danger);
  font-size: 13px;
  font-weight: 600;
}

/* ── Combobox ──────────────────────────────────────── */

.comboWrap {
  position: relative;
}

.comboWrap .textField {
  padding-right: 36px;
}

.comboToggle {
  position: absolute;
  right: 1px;
  top: 1px;
  bottom: 1px;
  width: 34px;
  border: 0;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 12px;
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.comboToggle:hover {
  background: rgba(11, 106, 168, 0.06);
}

.comboDropdown {
  display: none;
  position: absolute;
  left: 0;
  right: 0;
  top: 100%;
  margin-top: 4px;
  max-height: 220px;
  overflow-y: auto;
  background: var(--panel);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm);
  box-shadow: 0 8px 24px rgba(24, 49, 74, 0.14);
  z-index: 100;
}

.comboDropdown.isOpen {
  display: block;
}

.comboOption {
  padding: 9px 14px;
  cursor: pointer;
  font-size: 14px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.comboOption:hover,
.comboOption.isActive {
  background: rgba(11, 106, 168, 0.08);
  color: var(--accent);
}

.comboEmpty {
  padding: 12px 14px;
  color: var(--text-muted);
  font-size: 13px;
  font-style: italic;
}

/* ── Buttons ────────────────────────────────────────── */

.primaryButton,
.secondaryButton,
.ghostButton,
.dangerButton {
  border-radius: 999px;
  padding: 11px 22px;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease;
}

.primaryButton {
  border: 0;
  background: linear-gradient(135deg, var(--accent) 0%, #2f87c5 100%);
  color: #fff;
  box-shadow: 0 12px 28px rgba(11, 106, 168, 0.22);
}

.secondaryButton,
.ghostButton,
.dangerButton {
  border: 1px solid var(--border);
  background: var(--panel);
  color: var(--text);
}

.dangerButton {
  color: var(--danger);
}

.primaryButton:hover,
.secondaryButton:hover,
.ghostButton:hover,
.dangerButton:hover {
  transform: translateY(-1px);
}

.primaryButton:disabled,
.secondaryButton:disabled,
.ghostButton:disabled,
.dangerButton:disabled {
  cursor: wait;
  opacity: 0.7;
  transform: none;
}

.smallButton {
  padding: 7px 14px;
  font-size: 13px;
}

/* ── Shared Layout Helpers ──────────────────────────── */

.buttonGroup {
  display: flex;
  gap: 12px;
  align-items: center;
  flex-shrink: 0;
}

.actionBar {
  display: flex;
  justify-content: space-between;
  padding-top: 8px;
  gap: 24px;
  align-items: center;
}

.actionNote {
  flex: 1;
  min-width: 0;
}

.pill {
  display: inline-flex;
  align-items: center;
  border-radius: 999px;
  background: rgba(11, 106, 168, 0.08);
  color: var(--accent);
  padding: 4px 9px;
  font-size: 13px;
  font-weight: 700;
}

.dangerPill {
  background: var(--danger-soft);
  color: var(--danger);
}

.isHidden {
  display: none;
}

/* ── Section Cards (Editor) ─────────────────────────── */

.sectionCard,
.testCard,
.noteRow,
.aliasRow,
.sourceCard {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
}

.sectionCard {
  margin-bottom: 18px;
  padding: 20px;
}

.sectionHead {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  margin-bottom: 18px;
}

.sectionHead > div:first-of-type {
  flex: 1;
}

.sectionHead:has(+ .collapseBody.isCollapsed) {
  margin-bottom: 0;
}

.grid2,
.grid3 {
  display: grid;
  gap: 14px;
}

.grid2 {
  grid-template-columns: repeat(2, minmax(0, 1fr));
}

.grid3 {
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

.testGrid,
.aliasList,
.noteList,
.sourceList,
.sourceEntryList {
  display: grid;
  gap: 12px;
}

.sourceEntryRow {
  background: var(--panel-muted);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px;
  display: grid;
  gap: 10px;
}

.sourceEntryActions {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 12px;
  padding-top: 4px;
}

.sourceEntryPreferredLabel {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  flex: 1;
  min-width: 0;
}

.testTitleActions {
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}

.testCard {
  padding: 18px;
  background: linear-gradient(180deg, rgba(246, 249, 252, 0.82), #ffffff 100%);
}

.testTitleRow,
.sourceRowHead {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  align-items: center;
  margin-bottom: 16px;
}

.aliasRow,
.noteRow,
.sourceCard {
  padding: 14px;
}

.aliasRow {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 12px;
  align-items: end;
}

.noteRow {
  display: grid;
  gap: 12px;
}

.toggleList {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
}

.toggleItem {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  border: 1px solid var(--border);
  border-radius: 999px;
  background: var(--panel-muted);
  padding: 10px 14px;
  font-weight: 700;
}

.toggleItem input {
  accent-color: var(--accent);
}

.sourceReferenceMeta {
  margin-bottom: 16px;
}

.inlineActions,
.cardActions,
.actionRow {
  display: flex;
  gap: 12px;
  align-items: center;
}

/* ── Validation & Danger ────────────────────────────── */

.validationSummary {
  border-color: rgba(181, 75, 75, 0.35);
  background: rgba(255, 249, 249, 0.95);
}

.validationSummary ul {
  margin: 14px 0 0;
  padding-left: 20px;
}

.dangerSection {
  border-color: rgba(181, 75, 75, 0.32);
  background: linear-gradient(180deg, rgba(255, 248, 248, 0.96), #ffffff 100%);
}

.dangerActions {
  margin-top: 16px;
}

/* ── Status Banner ──────────────────────────────────── */

.statusBanner {
  border-radius: 16px;
  padding: 12px 14px;
  background: rgba(11, 106, 168, 0.08);
}

.statusBanner.isSuccess {
  background: rgba(29, 125, 94, 0.12);
  color: var(--success);
}

.statusBanner.isError {
  background: rgba(181, 75, 75, 0.12);
  color: var(--danger);
  white-space: pre-line;
}

/* ── Cross-Reactivity ───────────────────────────────── */

.crGroupList {
  display: grid;
  gap: 14px;
}

.crGroupCard {
  background: linear-gradient(180deg, rgba(246, 249, 252, 0.82), #ffffff 100%);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 18px;
}

.crGroupHeader {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  margin-bottom: 16px;
}

.crEntryList {
  display: grid;
  gap: 10px;
  margin-top: 14px;
}

.crEntryRow {
  background: var(--panel-muted);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px;
}

.crEntryActions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  padding-top: 8px;
}

/* ── Collapsible Sections ──────────────────────────── */

.collapseToggle {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  flex-shrink: 0;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--panel-muted);
  color: var(--text-muted);
  cursor: pointer;
  font-size: 11px;
  transition: background 120ms ease, transform 120ms ease;
}

.collapseToggle:hover {
  background: rgba(11, 106, 168, 0.08);
  color: var(--accent);
}

.collapseChevron {
  transition: transform 200ms ease;
}

.collapseToggle.isCollapsed .collapseChevron {
  transform: rotate(0deg);
}

.collapseBody {
  transition: none;
}

.collapseBody.isCollapsed {
  display: none;
}

/* ── Empty State ────────────────────────────────────── */

.emptyState {
  border: 1px dashed var(--border-strong);
  border-radius: var(--radius-md);
  padding: 18px;
  background: rgba(246, 249, 252, 0.72);
}

/* ── Responsive ─────────────────────────────────────── */

@media (max-width: 720px) {
  .appShell {
    padding: 12px;
  }

  .viewPanel {
    padding: 18px;
  }

  .grid2,
  .grid3 {
    grid-template-columns: 1fr;
  }

  .cardGrid {
    grid-template-columns: 1fr;
  }

  .listToolbar {
    flex-direction: column;
    align-items: stretch;
  }

  .searchField {
    max-width: none;
  }

  .actionBar,
  .testTitleRow,
  .sourceRowHead,
  .sectionHead,
  .viewHeader {
    flex-direction: column;
    align-items: stretch;
  }

  .sectionHead {
    flex-direction: row;
    flex-wrap: wrap;
    align-items: flex-start;
  }

  .testTitleActions {
    justify-content: flex-start;
  }

  .aliasRow {
    grid-template-columns: 1fr;
  }

  .sourceEntryActions {
    flex-direction: column;
    align-items: stretch;
  }

  .sourceEntryPreferredLabel {
    padding: 8px 0;
  }

  .crGroupHeader {
    flex-direction: column;
    align-items: stretch;
  }
}

/* ── Large screens ─────────────────────────────────── */

@media (min-width: 1200px) {
  .appShell {
    padding: 28px 40px;
  }

  .grid2 {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .grid3 {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }

  .cardGrid {
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  }
}

@media (min-width: 1800px) {
  .appShell {
    padding: 36px 56px;
  }

  .grid2 {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .grid3 {
    grid-template-columns: repeat(4, minmax(0, 1fr));
  }

  .cardGrid {
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  }
}
</style>
